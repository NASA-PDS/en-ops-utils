name: Secret Detection Workflow
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    secret-detection:
        runs-on: ubuntu-latest
        steps:
            -
                name: Checkout code
                uses: actions/checkout@v5
            -
                name: Install detect-secrets
                run: pip install detect-secrets~=1.5.0

            -
                name: Create initial .secrets.baseline if missing
                run: |
                    if [ ! -f .secrets.baseline ]; then
                        echo "⚠️ No .secrets.baseline detected. Creating baseline via script."
                        scripts/detect_secrets_baseline.sh scan
                        echo "✅ .secrets.baseline created."
                    else
                        echo "✅ Existing .secrets.baseline detected."
                    fi

            -
                name: Scan repository for secrets
                run: scripts/detect_secrets_baseline.sh
